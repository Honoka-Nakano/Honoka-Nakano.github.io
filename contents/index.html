<!DOCTYPE html>
<html lang="ja" class="w-full h-[100svh]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/./src/output.css">
    <link href="https://use.fontawesome.com/releases/v6.5.1/css/all.css" rel="stylesheet">
    <title>Nakano Keisuke</title>
    <style>
        .openbtn.active span:nth-of-type(1) {
            top: 14px;
            left: 18px;
            transform: translateY(6px) rotate(-45deg);
            width: 30%;
        }
        .openbtn.active span:nth-of-type(2) {
            opacity: 0;
        }
        .openbtn.active span:nth-of-type(3) {
            top: 26px;
            left: 18px;
            transform: translateY(-6px) rotate(45deg);
            width: 30%;
        }
        .openbtn.active span:nth-of-type(3)::after {
            content: 'Close';
            transform: translateY(0) rotate(-45deg);
            top: 5px;
            left: 4px;
        }
    </style>
</head>
<body class="w-full h-full">
    <header class="fixed w-full h-[70px]">
        <div class="flex justify-between w-full h-full">
            <a href="">
                <div class="flex items-center justify-center h-full p-2 space-x-2">
                    <img src="/./src/img/logo.png" alt="Logo Image" class="h-full rounded-xl">
                    <h1 class="font-bold text-3xl">Honoka Nakano</h1>
                </div>
            </a>
            <div class="h-fit w-fit my-auto mr-2">
                <div class="openbtn relative bg-black cursor-pointer w-[50px] h-[50px] rounded-md">
                    <span class="inline-block absolute left-[14px] h-[2px] rounded-md bg-white w-[45%] top-[13px]"
                        style="transition: all .4s;"></span>
                    <span class="inline-block absolute left-[14px] h-[2px] rounded-md bg-white w-[45%] top-[19px]"
                        style="transition: all .4s"></span>
                    <span class="inline-block absolute left-[14px] h-[2px] rounded-md bg-white w-[45%] top-[25px]
                        after:content-['Menu'] after:absolute after:top-[5px] after:left-[-2px] after:text-white after:text-[0.6rem] after:uppercase"
                        style="transition: all .4s"></span>
                </div>
            </div>
        </div>
    </header>
    <main class="h-full">
        <div class="h-fit w-fit m-auto pt-[300px]">
            <h1 class="text-2xl font-bold">Here is a Contents page.</h1>
            <p>Under Development.</p>
            <ul class="space-y-2 p-4">
                <li><a href="/./">Home &rarr;</a></li>
                <li><a href="/./About/">About &rarr;</a></li>
                <li><a href="/./Contents/">Contents &rarr;</a></li>
            </ul>
        </div>
    </main>
    <footer></footer>
    <script
        src="https://code.jquery.com/jquery-3.4.1.min.js"
        integrity="sha256-CSXorXvZcTkaix6Yvo6HppcZGetbYMGWSFlBw8HfCJo="
        crossorigin="anonymous">
    </script>
    <script>
        $(".openbtn").click(function() {
            $(this).toggleClass('active');
        });
    </script>
</body>
</html>
